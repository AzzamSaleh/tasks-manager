# Application identity
spring.application.name=tasks-manager-backend


# =========================================================
# Server
# =========================================================

# Uses port 8080 locally.
# Deployment platforms can override it through PORT.
server.port=${PORT:8080}


# =========================================================
# Database
# =========================================================

# Local defaults continue using the tasks_manager MySQL schema.
# Deployment values will be supplied through environment variables.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tasks_manager?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}

# Creates and updates tables from JPA entities.
# Flyway is intentionally not used in this project.
spring.jpa.hibernate.ddl-auto=update

# Kept enabled to preserve the application's current behavior.
spring.jpa.open-in-view=true

# Uses UTC consistently when Hibernate sends timestamps to JDBC.
spring.jpa.properties.hibernate.jdbc.time_zone=UTC


# =========================================================
# Actuator
# =========================================================

# Exposes only safe deployment health and information endpoints.
management.endpoints.web.exposure.include=health,info


# =========================================================
# JWT
# =========================================================

# Local fallback secret.
# Deployment must provide a different value through JWT_SECRET.
jwt.secret=${JWT_SECRET:MSwkwRry/QTdhj4Ep5qBgqHNWSNG4yfDgbZKQOior1EwRRM=}

# Access-token lifetime in milliseconds.
# Local default: 15 minutes.
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}


# =========================================================
# Default Admin
# =========================================================

# Local development Admin account.
# Deployment must override the password.
app.default-admin.username=${DEFAULT_ADMIN_USERNAME:admin}
app.default-admin.password=${DEFAULT_ADMIN_PASSWORD:Admin@123}
app.default-admin.full-name=${DEFAULT_ADMIN_FULL_NAME:System Admin}
app.default-admin.email=${DEFAULT_ADMIN_EMAIL:admin@tasksmanager.com}


# =========================================================
# Frontend origins
# =========================================================

# Local Angular origins.
# Deployment will override this with the public frontend URL.
app.cors.allowed-origins=${FRONTEND_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
